pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: '*.{ts,tsx,js,jsx,json,md,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    - name: eslint
      glob: '*.{ts,tsx}'
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  jobs:
    - name: typecheck
      run: pnpm typecheck

    - name: test
      run: pnpm test
